<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --brand:#0E6E3A; --brand-dark:#094d28; --brand-tint:#e8f3ec;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f7f8fa; --card:#ffffff;
    --badge-img: url('{{BADGE_DATA_URI}}');
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* ── HEADER — white, matches website chrome ── */
  .ob-header{
    background:#fff;border-bottom:3px solid var(--brand);padding:0 40px;
  }
  .ob-header-inner{max-width:960px;margin:0 auto}
  /* Brand row: logo + separator + ABU-Materialplattform / ABU Reform 2030 */
  .ob-brand-row{
    display:flex;align-items:center;gap:12px;
    padding:10px 0;border-bottom:1px solid var(--line);
  }
  .ob-logo{height:48px;width:auto;flex-shrink:0;filter:brightness(0) saturate(100%);image-rendering:-webkit-optimize-contrast}
  .ob-brand-sep{width:1px;height:34px;background:var(--line);flex-shrink:0;margin:0 2px}
  .ob-brand-text{display:flex;flex-direction:column;gap:1px}
  .ob-brand-platform{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .ob-brand-reform{font-size:11px;color:#94a3b8}
  /* Guide intro below the brand row — flex row with decorative badge on the right */
  .ob-guide-intro-wrap{display:flex;align-items:center;gap:20px;padding:20px 0 26px}
  .ob-guide-intro{flex:1;min-width:0}
  .ob-deco-badge{
    width:80px;height:80px;flex-shrink:0;border-radius:50%;
    background-image:var(--badge-img);background-size:contain;
    background-repeat:no-repeat;background-position:center;
    opacity:0.88;
  }
  .ob-badge{
    display:inline-block;background:var(--brand-tint);color:var(--brand-dark);
    font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 10px;border-radius:99px;margin-bottom:12px;
  }
  .ob-header h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;color:var(--ink)}
  .ob-header .lead{font-size:15px;color:var(--muted);max-width:680px}

  /* ── STICKY TOOLBAR (view toggle + download) ── */
  .ob-toolbar{
    background:#fff;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:200;
    display:flex;align-items:center;gap:12px;padding:8px 28px;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .ob-toolbar-title{font-weight:600;font-size:13px;color:var(--muted);margin-right:auto;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40vw}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .seg button{border:0;background:transparent;padding:6px 14px;font:inherit;font-size:13px;
    cursor:pointer;color:var(--muted)}
  .seg button.active{background:var(--brand);color:#fff}
  .ob-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;
    font:inherit;font-size:13px;cursor:pointer;color:var(--ink)}
  .ob-btn:hover{border-color:var(--brand);color:var(--brand)}

  /* ── STICKY TAB NAV ── */
  nav.ob-toc{
    background:#fff;border-bottom:1px solid var(--line);
    position:sticky;top:41px;z-index:100;
    box-shadow:0 1px 6px rgba(0,0,0,.03);
  }
  .ob-toc-inner{max-width:960px;margin:0 auto;display:flex;gap:2px;
    overflow-x:auto;padding:0 24px;scrollbar-width:none}
  .ob-toc-inner::-webkit-scrollbar{display:none}
  .ob-toc button{
    display:flex;align-items:center;gap:8px;white-space:nowrap;
    background:none;border:none;border-bottom:3px solid transparent;
    color:var(--muted);font:inherit;font-size:13px;font-weight:600;
    padding:12px 12px;cursor:pointer;transition:color .15s,border-color .15s;
  }
  .ob-toc button:hover{color:var(--ink)}
  .ob-toc button.active{color:var(--brand-dark);border-bottom-color:var(--brand)}
  .ob-toc .n{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:50%;background:var(--brand-tint);
    color:var(--brand-dark);font-size:11px;font-weight:800;flex-shrink:0;
  }
  .ob-toc button.active .n{background:var(--brand);color:#fff}

  /* ── MAIN ── */
  main.ob-main{max-width:960px;margin:0 auto;padding:44px 28px 90px}

  /* Section panel */
  .sec-panel{display:none}
  .sec-panel.active{display:block}
  .sec-kicker{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    color:var(--brand);margin-bottom:6px}
  .sec-title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin-bottom:10px}
  .sec-intro{color:var(--muted);font-size:15.5px;max-width:760px;margin-bottom:28px}

  /* Step card */
  .step{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;margin-bottom:22px;break-inside:avoid;
  }
  .step-head{
    display:flex;align-items:flex-start;gap:14px;
    padding:18px 22px 14px;
  }
  .num{
    flex-shrink:0;width:30px;height:30px;border-radius:50%;
    background:var(--brand);color:#fff;font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;margin-top:3px;
  }
  .step-head h2{font-size:16px;font-weight:600;line-height:1.5;margin:0}
  .step-head h2 strong{font-weight:800;color:var(--ink)}
  .shot{margin:0;border-top:1px solid var(--line)}
  .shot img{display:block;width:100%;height:auto}
  .meta{font-size:12px;color:var(--muted);padding:8px 22px;
    border-top:1px solid var(--line);background:#fcfdfd;word-break:break-all}

  .step-divider{border:none;border-top:2px dashed var(--line);margin:30px 0}

  /* ── FOOTER ── */
  .ob-footer{
    text-align:center;padding:26px;font-size:13px;
    color:var(--muted);border-top:1px solid var(--line);background:#fff;
  }
  .ob-footer .lion{color:var(--brand);font-weight:700}

  /* ── SLIDE CONTROLS ── */
  .slide-controls{
    display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;
    align-items:center;justify-content:center;gap:18px;padding:14px;
    background:linear-gradient(transparent,rgba(0,0,0,.08));
  }
  .slide-controls .counter{font-variant-numeric:tabular-nums;color:var(--muted);
    min-width:90px;text-align:center}
  .nav-btn{
    width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:#fff;font-size:18px;cursor:pointer;line-height:1;
  }
  .nav-btn:hover{border-color:var(--brand);color:var(--brand)}

  /* ── SLIDES VIEW ── */
  body.view-slides{overflow:hidden;background:#0f172a}
  body.view-slides .ob-header,
  body.view-slides .ob-footer{display:none}
  body.view-slides .ob-toc{display:none}
  body.view-slides .ob-main{max-width:none;margin:0;padding:0}
  /* All sec-panels visible so JS can reach every .step */
  body.view-slides .sec-panel{display:block !important}
  body.view-slides .sec-kicker,
  body.view-slides .sec-title,
  body.view-slides .sec-intro,
  body.view-slides .step-divider{display:none}
  body.view-slides .step{display:none}
  body.view-slides .meta{display:none}
  body.view-slides .step.is-active{
    display:flex;flex-direction:column;position:fixed;inset:0;
    margin:0;border:0;border-radius:0;overflow:hidden;
    background:#fff;padding:40px 52px 80px;
    animation:ob-fade .18s ease;
  }
  body.view-slides .step.is-active .step-head{margin-bottom:18px;flex-shrink:0}
  body.view-slides .step.is-active .step-head h2{font-size:22px}
  body.view-slides .step.is-active .num{width:36px;height:36px;font-size:16px}
  body.view-slides .step.is-active .shot{
    flex:1 1 0;min-height:0;overflow:hidden;display:flex;
    align-items:center;justify-content:center;cursor:pointer;border:none;
  }
  body.view-slides .step.is-active .shot img{
    max-width:100%;max-height:100%;width:auto;height:auto;
    object-fit:contain;box-shadow:0 6px 30px rgba(0,0,0,.14);
  }
  /* BBW logo watermark — top-right corner of each slide */
  body.view-slides .step.is-active::after{
    content:'';
    position:absolute;top:12px;right:52px;
    width:48px;height:48px;
    background:url('{{LOGO_DARK_URI}}') no-repeat center/contain;
    opacity:0.12;
    pointer-events:none;
  }
  body.view-slides .slide-controls{display:flex}
  @keyframes ob-fade{from{opacity:.4}to{opacity:1}}

  /* ── PRINT INDEX (thumbnail overview — screen: hidden, print: first page) ── */
  .print-index{display:none}

  /* ── PRINT (A4 landscape, one step per page) ── */
  @media print{
    @page{size:A4 landscape;margin:12mm}
    body{background:#fff}
    .ob-toolbar,.ob-toc,.slide-controls,.ob-footer,.ob-header{display:none !important}
    .ob-main{max-width:none;padding:0;margin:0}
    .sec-panel{display:block !important}
    .sec-title,.sec-kicker,.sec-intro,.step-divider{display:none}

    /* ── index page ── */
    .print-index{
      display:block !important;
      height:calc(100vh - 24mm);
      overflow:hidden;
      break-after:page;page-break-after:always;
    }
    .pi-cover{
      background:linear-gradient(135deg,var(--brand-dark),var(--brand));
      color:#fff;padding:5mm 10mm 5mm;border-radius:3pt;margin-bottom:4mm;
      position:relative;overflow:hidden;
    }
    .pi-cover::after{
      content:'';
      position:absolute;right:5mm;top:50%;transform:translateY(-50%);
      width:18mm;height:18mm;
      background-image:var(--badge-img);background-size:contain;
      background-repeat:no-repeat;background-position:center;
      opacity:0.75;
    }
    /* Brand row inside the cover */
    .pi-cover-brand{display:flex;align-items:center;gap:4mm;margin-bottom:3mm}
    .pi-logo{height:22pt;width:auto;flex-shrink:0}
    .pi-cover-sep{width:0.5pt;height:17pt;background:rgba(255,255,255,.35);flex-shrink:0}
    .pi-cover-tagline{display:flex;flex-direction:column;gap:0.3mm;font-size:7pt;opacity:.85}
    .pi-cover h2{font-size:14pt;font-weight:800;letter-spacing:-.01em}
    .pi-cover p{font-size:7.5pt;opacity:.85;margin-top:0.5mm}
    .pi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3.5mm 4mm}
    a.pi-item{display:block;text-decoration:none;color:inherit}
    .pi-item{break-inside:avoid}
    .pi-row1{display:flex;align-items:center;gap:1.5mm;margin-bottom:1.5mm}
    .pi-num{
      display:inline-flex;align-items:center;justify-content:center;
      width:13pt;height:13pt;border-radius:50%;flex-shrink:0;
      background:var(--brand);color:#fff;font-weight:800;font-size:6.5pt;
    }
    .pi-sec{font-size:5.5pt;color:var(--muted);font-weight:700;
      text-transform:uppercase;letter-spacing:.04em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pi-item img{width:100%;height:auto;border:1px solid var(--line);
      border-radius:2pt;display:block}
    .pi-cap{font-size:5.5pt;color:var(--ink);margin-top:1mm;line-height:1.35;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* ── step pages ── */
    .step{
      display:flex !important;flex-direction:column;
      height:calc(100vh - 24mm);overflow:hidden;
      margin:0;border:0;border-radius:0;
      break-after:page;page-break-after:always;
    }
    .step:last-of-type{break-after:auto;page-break-after:auto}
    .step-head{flex-shrink:0}
    .step-head h2{font-size:14pt}
    .shot{flex:1 1 auto;min-height:0;overflow:hidden;text-align:center;border:none}
    .shot img{max-height:100%;width:auto;max-width:100%;box-shadow:none;object-fit:contain}
    .meta{font-size:9pt;flex-shrink:0}
  }

  @media (max-width:640px){
    .ob-header{padding:0 20px}
    .ob-header h1{font-size:22px}
    .ob-main{padding:28px 16px 60px}
    .ob-toc-inner{padding:0 12px}
  }
</style>
</head>
<body class="view-doc">

<header class="ob-header">
  <div class="ob-header-inner">
    <!-- Brand row: matches the website top-bar chrome exactly -->
    <div class="ob-brand-row">
      <img src="{{LOGO_DARK_URI}}" alt="BBW Berufsbildungsschule Winterthur" class="ob-logo">
      <span class="ob-brand-sep"></span>
      <span class="ob-brand-text">
        <span class="ob-brand-platform">ABU-Materialplattform</span>
        <span class="ob-brand-reform">ABU Reform 2030</span>
      </span>
    </div>
    <!-- Guide intro + decorative ABU 2030 badge -->
    <div class="ob-guide-intro-wrap">
      <div class="ob-guide-intro">
        <div class="ob-badge">Einführung &amp; Rundgang</div>
        <h1>{{TITLE}}</h1>
        {{DESC_BLOCK}}
      </div>
      <div class="ob-deco-badge" role="presentation" aria-hidden="true"></div>
    </div>
  </div>
</header>

<div class="ob-toolbar">
  <span class="ob-toolbar-title">{{TITLE}}</span>
  <div class="seg" role="tablist">
    <button id="mDoc" class="active" type="button">{{L_DOC}}</button>
    <button id="mSlides" type="button">{{L_SLIDES}}</button>
  </div>
  <a id="btnDownload" class="ob-btn" style="text-decoration:none">{{L_DOWNLOAD}}</a>
</div>

<nav class="ob-toc">
  <div class="ob-toc-inner">
    {{TABS}}
  </div>
</nav>

<main class="ob-main">
  {{PRINT_INDEX}}
  {{SECTIONS}}
</main>

<footer class="ob-footer">
  <span class="lion">▲</span> ABU-Materialplattform &middot; BBW Berufsbildungsschule Winterthur &middot; ABU Reform 2030
</footer>

<div class="slide-controls">
  <button class="nav-btn" id="prev" type="button" aria-label="Previous">‹</button>
  <span class="counter">{{L_STEP}} <span id="cur">1</span> {{L_OF}} <span id="total">1</span></span>
  <button class="nav-btn" id="next" type="button" aria-label="Next">›</button>
</div>

<script>
(function(){
  var sections = Array.prototype.slice.call(document.querySelectorAll('.sec-panel'));
  var steps    = Array.prototype.slice.call(document.querySelectorAll('.step'));
  var tabs     = Array.prototype.slice.call(document.querySelectorAll('.ob-toc button'));
  var i = 0, mode = 'doc';

  document.getElementById('total').textContent = steps.length;

  function showStep(n){
    if(!steps.length) return;
    i = Math.max(0, Math.min(steps.length-1, n));
    steps.forEach(function(s,idx){ s.classList.toggle('is-active', idx===i); });
    document.getElementById('cur').textContent = i+1;
  }
  function showSection(n){
    sections.forEach(function(s,idx){ s.classList.toggle('active', idx===n); });
    tabs.forEach(function(t,idx){ t.classList.toggle('active', idx===n); });
  }
  function setMode(m){
    mode = m;
    document.body.classList.toggle('view-slides', m==='slides');
    document.body.classList.toggle('view-doc',   m==='doc');
    document.getElementById('mDoc').classList.toggle('active', m==='doc');
    document.getElementById('mSlides').classList.toggle('active', m==='slides');
    if(m==='slides'){ showStep(i); window.scrollTo(0,0); }
  }

  tabs.forEach(function(btn,idx){
    btn.addEventListener('click', function(){ if(mode==='doc') showSection(idx); });
  });
  document.getElementById('mDoc').onclick    = function(){ setMode('doc'); };
  document.getElementById('mSlides').onclick = function(){ setMode('slides'); };
  (function(){
    var btn = document.getElementById('btnDownload');
    btn.href = window.location.href.replace(/[?#].*$/,'').replace(/\.html$/,'.pdf');
    btn.download = '';
  })();
  document.getElementById('next').onclick = function(){ showStep(i+1); };
  document.getElementById('prev').onclick = function(){ showStep(i-1); };

  steps.forEach(function(s){
    var shot = s.querySelector('.shot');
    if(shot) shot.addEventListener('click', function(){ if(mode==='slides') showStep(i+1); });
  });

  document.addEventListener('keydown', function(e){
    if(mode!=='slides') return;
    if(['ArrowRight','PageDown',' ','Spacebar'].indexOf(e.key)>=0){ e.preventDefault(); showStep(i+1); }
    else if(['ArrowLeft','PageUp'].indexOf(e.key)>=0){ e.preventDefault(); showStep(i-1); }
    else if(e.key==='Home'){ showStep(0); }
    else if(e.key==='End'){ showStep(steps.length-1); }
    else if(e.key==='f'||e.key==='F'){
      if(!document.fullscreenElement){ document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); }
      else{ document.exitFullscreen&&document.exitFullscreen(); }
    }
    else if(e.key==='Escape'&&document.fullscreenElement){ document.exitFullscreen&&document.exitFullscreen(); }
  });

  showSection(0);
  showStep(0);
})();
</script>
</body>
</html>
